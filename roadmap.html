<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keim Roadmap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FEFEFE;
            --text: #1C1B21;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #111111;
                --text: #FEFEFE;
            }
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: background-color 0.3s ease;
        }
        .outfit { font-family: 'Outfit', sans-serif; }
        
        /* Markdown Styling */
        #content h1 { font-family: 'Outfit', sans-serif; font-size: 2.5rem; font-weight: 700; margin-bottom: 2rem; border-bottom: 1px solid rgba(128,128,128,0.1); padding-bottom: 1rem; }
        #content h2 { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 700; margin-top: 3rem; margin-bottom: 1.5rem; color: #6366f1; text-transform: uppercase; letter-spacing: 0.1em; }
        #content h3 { font-size: 1.1rem; font-weight: 700; margin-top: 2rem; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; }
        #content p { margin-bottom: 1rem; opacity: 0.8; line-height: 1.6; }
        #content ul { margin-bottom: 1.5rem; list-style-type: none; padding-left: 0; }
        #content li { position: relative; padding-left: 1.5rem; margin-bottom: 0.5rem; opacity: 0.9; }
        #content li::before { content: "→"; position: absolute; left: 0; color: #6366f1; opacity: 0.5; font-weight: bold; }
        #content hr { margin: 3rem 0; border: 0; border-top: 1px solid rgba(128,128,128,0.1); }
        #content strong { color: var(--text); font-weight: 600; }
        #content em { color: #6366f1; font-style: normal; font-weight: 500; font-size: 0.85rem; background: rgba(99, 102, 241, 0.1); padding: 0.1rem 0.4rem; rounded: 4px; }
        
        .glass {
            background: rgba(128, 128, 128, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(128, 128, 128, 0.1);
            border-radius: 24px;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-fade {
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body class="min-h-screen py-20 px-6">
    <div class="max-w-3xl mx-auto">
        <!-- Header -->
        <div class="flex items-center justify-between mb-16 animate-fade">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-2xl bg-indigo-500/10 flex items-center justify-center text-indigo-500">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold outfit">Keim Intelligence</h1>
                    <p class="text-xs opacity-40 uppercase tracking-widest font-bold">Internal Development Roadmap</p>
                </div>
            </div>
            <div class="text-[10px] font-bold opacity-30 uppercase tracking-[0.2em] animate-pulse">
                Live from ROADMAP.md
            </div>
        </div>

        <!-- Content Area -->
        <div id="content" class="glass p-8 md:p-12 animate-fade" style="animation-delay: 0.1s;">
            <div class="flex items-center justify-center py-20">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-500"></div>
            </div>
        </div>

        <!-- Footer -->
        <div class="mt-12 text-center opacity-30 text-[10px] uppercase tracking-widest font-bold animate-fade" style="animation-delay: 0.2s;">
            Development Build • Restricted Access
        </div>
    </div>

    <script>
        async function loadRoadmap() {
            try {
                const response = await fetch('./ROADMAP.md');
                if (!response.ok) throw new Error('Roadmap file not found');
                const markdown = await response.text();
                
                // Configure marked for custom styling if needed
                const renderer = new marked.Renderer();
                
                document.getElementById('content').innerHTML = marked.parse(markdown, { renderer });
            } catch (err) {
                document.getElementById('content').innerHTML = `
                    <div class="text-center py-10">
                        <p class="text-red-500 font-bold mb-4">Error loading roadmap</p>
                        <p class="opacity-50 text-sm">Make sure you are running 'npm run dev' and ROADMAP.md exists.</p>
                    </div>
                `;
                console.error(err);
            }
        }

        window.onload = loadRoadmap;
    </script>
</body>
</html>
